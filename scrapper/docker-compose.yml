services:
  postgres:
    image: postgres:16-alpine
    container_name: saflow-scrapper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-saflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-saflow}
      POSTGRES_DB: ${POSTGRES_DB:-scrapper}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-saflow} -d ${POSTGRES_DB:-scrapper}"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: saflow-scrapper-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
